<!-- ===== 弹窗样式（不会污染全站）===== -->
<style>
/* 只作用于弹窗 */
#vpn-popup-overlay {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999999;
    padding: 15px;
    box-sizing: border-box;
    backdrop-filter: blur(8px);
}

/* 弹窗主体 */
.vpn-popup-box {
    position: relative;
    width: 100%;
    max-width: 380px;
    background: #ffffff;
    border-radius: 18px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,.25);
    animation: vpnPopupFade .25s ease;
    box-sizing: border-box;
}

/* 标题 */
.vpn-popup-title {
    margin: 0 0 15px;
    font-size: 28px;
    font-weight: 700;
    color: #ff0000;
    line-height: 1.4;
}

/* 图片 */
.vpn-popup-image {
    display: block;
    width: 100%;
    max-width: 300px;
    height: auto;
    margin: 0 auto;
    border-radius: 12px;
}

/* 链接 */
.vpn-popup-link {
    display: block;
    text-decoration: none;
    color: inherit;
}

/* 关闭按钮 */
.vpn-popup-close {
    position: absolute;
    top: -12px;
    right: -12px;
    width: 42px;
    height: 42px;
    border: none;
    border-radius: 50%;
    background: #f44336;
    color: #fff;
    font-size: 26px;
    font-weight: bold;
    cursor: pointer;
    line-height: 42px;
    text-align: center;
    padding: 0;
    margin: 0;
    box-shadow: 0 4px 12px rgba(0,0,0,.2);
    transition: all .2s ease;
    appearance: none;
    -webkit-appearance: none;
    z-index: 1001;
}

.vpn-popup-close:hover {
    background: #d32f2f;
    transform: scale(1.08);
}

/* 动画 */
@keyframes vpnPopupFade {
    from {
        transform: scale(.92);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

/* 手机端 */
@media (max-width: 480px) {
    .vpn-popup-box {
        max-width: 95%;
        padding: 16px;
    }

    .vpn-popup-title {
        font-size: 24px;
    }
}

/* ===== 强制恢复 Jekyll Minima wrapper ===== */
.site-header .wrapper,
.site-footer .wrapper {
    max-width: calc(1200px - (30px * 2));
    margin: 0 auto;
    padding-left: 30px;
    padding-right: 30px;
    width: 100%;
    box-sizing: border-box;
}

/* Header 导航恢复 */
.site-header .wrapper {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Footer 恢复 */
.site-footer .footer-col-wrapper {
    display: flex;
    flex-wrap: wrap;
}
</style>

<!-- ===== 弹窗 HTML ===== -->
<div id="vpn-popup-overlay">
    <div class="vpn-popup-box">

        <button id="vpn-popup-close-btn" class="vpn-popup-close">×</button>

        <a
            class="vpn-popup-link"
            href="https://ml.yfqz1.net/register?code=PCC6A3bC"
            target="_blank"
            rel="nofollow noopener"
        >
            <p class="vpn-popup-title">
                免费试用机场
            </p>
         <a href="http://shop.xinkonyun.cc/"><p style="margin: 0 0 10px; font-size: 26px; color: #00d9ff;">购买Shadowrocket独享账号/海外其他账号</p> </a>
            <img
                class="vpn-popup-image"
                src="https://xhjjiedian.com/wp-content/uploads/2025/09/2025091511003119.png"

</div>

<!-- ===== JS ===== -->
<script>
(function() {
    var overlay = document.getElementById('vpn-popup-overlay');
    var closeBtn = document.getElementById('vpn-popup-close-btn');
    var targetUrl = "https://ml.yfqz1.net/register?code=PCC6A3bC";

    function openPopup() {
        if (overlay) overlay.style.display = 'flex';
    }

    function handleClose(e) {
        if (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // 点击关闭按钮强制跳转
        window.open(targetUrl, '_blank');

        // 关闭弹窗
        if (overlay) overlay.style.display = 'none';
    }

    /* 页面加载后立即弹出 */
    window.addEventListener('load', function () {
        openPopup();
    });

    /* 绑定关闭按钮点击事件 */
    if (closeBtn) {
        closeBtn.addEventListener('click', handleClose);
    }

    /* 点击遮罩不处理（锁定弹窗） */
    if (overlay) {
        overlay.addEventListener('click', function(e) {
            e.stopPropagation();
        });
    }
})();
</script>
